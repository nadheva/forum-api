name: Continuous Integration

on:
  pull_request:
    branches:
      - main

jobs:
  test:
    runs-on: ubuntu-latest

    services:
      postgres:
        image: postgres:14
        env:
          POSTGRES_USER: postgres
          POSTGRES_PASSWORD: supersecretpassword
          POSTGRES_DB: forumapi_test
        ports:
          - 5432:5432
        options: >-
          --health-cmd pg_isready
          --health-interval 10s
          --health-timeout 5s
          --health-retries 5

    strategy:
      matrix:
        node-version: [18.x, 20.x, 22.x]

    steps:
      - name: Checkout Repository
        uses: actions/checkout@v4

      - name: Use Node.js ${{ matrix.node-version }}
        uses: actions/setup-node@v4
        with:
          node-version: ${{ matrix.node-version }}

      - name: Install Dependencies
        run: npm install

      # Menjalankan migrasi menggunakan format DATABASE_URL
      - name: Run Database Migrations
        run: npm run migrate up
        env:
          DATABASE_URL: postgres://postgres:supersecretpassword@localhost:5432/forumapi_test

      # Menjalankan seluruh pengujian
      - name: Run Tests
        run: npm run test
        env:
          # Variabel DB Test dalam format URL (untuk migrator/beberapa test)
          DATABASE_URL: postgres://postgres:supersecretpassword@localhost:5432/forumapi_test
          
          # Variabel DB Test dalam format satuan (untuk aplikasi/Boilerplate Dicoding)
          PGHOST_TEST: localhost
          PGUSER_TEST: postgres
          PGPASSWORD_TEST: supersecretpassword
          PGDATABASE_TEST: forumapi_test
          PGPORT_TEST: 5432
          
          # Variabel Security
          ACCESS_TOKEN_KEY: supersecretaccesstokenkey
          REFRESH_TOKEN_KEY: supersecretrefreshtokenkey
          ACCCESS_TOKEN_AGE: 1800