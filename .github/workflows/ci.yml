name: Continuous Integration

on:
  pull_request:
    branches:
      - main
      - master

jobs:
  test:
    runs-on: ubuntu-latest

    services:
      postgres:
        image: postgres:14
        env:
          POSTGRES_USER: postgres
          POSTGRES_PASSWORD: supersecretpassword
          POSTGRES_DB: forumapi_test
        ports:
          - 5432:5432
        options: >-
          --health-cmd pg_isready
          --health-interval 10s
          --health-timeout 5s
          --health-retries 5

    strategy:
      matrix:
        node-version: [20.x]

    steps:
      - name: Checkout Repository
        uses: actions/checkout@v4

      - name: Use Node.js ${{ matrix.node-version }}
        uses: actions/setup-node@v4
        with:
          node-version: ${{ matrix.node-version }}

      - name: Install, Migrate and Test
        run: |
          npm install
          npm run migrate up
          npm run test
        env:
          CI: true
          # Koneksi Database URL (untuk migrasi)
          DATABASE_URL: postgres://postgres:supersecretpassword@localhost:5432/forumapi_test
          
          # Variabel Database untuk Aplikasi (Format Standar & Versi _TEST)
          PGHOST: localhost
          PGUSER: postgres
          PGPASSWORD: supersecretpassword
          PGDATABASE: forumapi_test
          PGPORT: 5432
          
          PGHOST_TEST: localhost
          PGUSER_TEST: postgres
          PGPASSWORD_TEST: supersecretpassword
          PGDATABASE_TEST: forumapi_test
          PGPORT_TEST: 5432
          
          # Kunci Keamanan (Pastikan sudah diset di GitHub Secrets)
          ACCESS_TOKEN_KEY: ${{ secrets.ACCESS_TOKEN_KEY }}
          REFRESH_TOKEN_KEY: ${{ secrets.REFRESH_TOKEN_KEY }}
          ACCESS_TOKEN_AGE: ${{ secrets.ACCESS_TOKEN_AGE }}